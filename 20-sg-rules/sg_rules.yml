bastion:
- name: bastion_internet
  port: 22
  src: internet  #laptop or our internet ip address
  dest: bastion
mongodb:
- name: mongodb_bastion
  port: 22
  src: bastion
  dest: mongodb
- name: mongodb_catalogue # MongoDB accepting connections from Catalogue
  port: 27017
  src: catalogue
  dest: mongodb
- name: mongodb_user
  port: 27017
  src: user
  dest: mongodb